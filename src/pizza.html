<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="../src/assets/images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفاصيل البيتزا</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --main-color: #ffc107;
        --text-gray: #6c757d;
      }
      body {
        background-color: #fcfcfc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .product-img {
        max-height: 450px;
        object-fit: cover;
        border-radius: 20px;
      }
      .star-rating {
        font-size: 1.5rem;
        color: #ddd;
        cursor: pointer;
        display: inline-block;
      }
      .star-rating .fa-star.active {
        color: var(--main-color);
      }
      .comment-card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        border-right: 5px solid var(--main-color);
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      .btn-submit {
        background-color: #333;
        color: white;
        border-radius: 8px;
        padding: 10px 25px;
        transition: 0.3s;
      }
      .btn-submit:hover {
        background-color: var(--main-color);
        color: #333;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">بيتزا دي روما</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 p-0">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item"><a class="nav-link" href="order.html">طلبك</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">حول المطعم</a></li>
            <li class="nav-item"><a class="nav-link" href="contactUs.html">اتصل بنا</a></li>
          </ul>
          <div class="navbar-logo">
            <img src="../src/assets/images/logo.png" alt="Logo" width="40" />
          </div>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row g-5 align-items-center">
        <div class="col-md-6">
          <img
            id="display-img"
            src="../src/assets/images/logo.png"
            alt="Product"
            class="product-img w-100 shadow"
          />
        </div>
        <div class="col-md-6">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-dark">الرئيسية</a></li>
              <li class="breadcrumb-item active" id="breadcrumb-name">المنتج</li>
            </ol>
          </nav>
          <h1 id="display-name" class="display-4 fw-bold mb-3"></h1>
          <h2 id="display-price" class="text-danger fw-bold mb-4"></h2>
          <p class="lead text-muted mb-4">
            استمتع بمذاق البيتزا الإيطالية الأصلية، محضرة يدوياً بأجود المكونات
            الطازجة والتوابل السرية لتمنحك تجربة لا تُنسى.
          </p>
        </div>
      </div>

      <hr class="my-5" />

      <div class="row">
        <div class="col-lg-7">
          <h3 class="mb-4 fw-bold text-dark">آراء العملاء</h3>
          <div id="comments-container">
            <div class="text-muted small">لا توجد تعليقات بعد، كن أول من يعلق!</div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card border-0 shadow-sm p-4 rounded-4">
            <h4 class="fw-bold mb-3">أضف تقييمك</h4>
            <div class="mb-3">
              <label class="d-block mb-2 fw-medium">تقييمك بالنجوم:</label>
              <div class="star-rating" id="star-input">
                <i class="fa-solid fa-star" data-value="1"></i>
                <i class="fa-solid fa-star" data-value="2"></i>
                <i class="fa-solid fa-star" data-value="3"></i>
                <i class="fa-solid fa-star" data-value="4"></i>
                <i class="fa-solid fa-star" data-value="5"></i>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">تعليقك:</label>
              <textarea id="user-comment" class="form-control" rows="4" placeholder="اكتب رأيك في هذا المنتج..."></textarea>
            </div>
            <button onclick="postComment()" class="btn btn-submit w-100 fw-bold">نشر التعليق</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        // 1. استخراج البيانات من الرابط وتحديث العناصر
        const urlParams = new URLSearchParams(window.location.search);
        const pName = urlParams.get("name") || "بيتزا شهية";
        const pPrice = urlParams.get("price") || "0.00";
        const pImg = urlParams.get("img");

        const nameDisplay = document.getElementById("display-name");
        const breadcrumbDisplay = document.getElementById("breadcrumb-name");
        const priceDisplay = document.getElementById("display-price");
        const imageDisplay = document.getElementById("display-img");

        if (nameDisplay) nameDisplay.innerText = pName;
        if (breadcrumbDisplay) breadcrumbDisplay.innerText = pName;
        if (priceDisplay) priceDisplay.innerText = "$" + pPrice;

        // تحديث الصورة بناءً على مسارات Webpack
        if (pImg && imageDisplay) {
          let folder = pImg.startsWith("product") ? "products" : "slide-images";
          imageDisplay.src = `assets/images/${folder}/${pImg}`;
        }

        // 2. منطق النجوم
        let selectedRating = 0;
        const stars = document.querySelectorAll("#star-input i");

        stars.forEach((star) => {
          star.addEventListener("click", () => {
            selectedRating = star.getAttribute("data-value");
            updateStarsDisplay(selectedRating);
          });
        });

        function updateStarsDisplay(rating) {
          stars.forEach((s) => {
            s.classList.toggle("active", s.getAttribute("data-value") <= rating);
          });
        }

        // 3. وظيفة التعليقات
        window.postComment = function() {
          const commentInput = document.getElementById("user-comment");
          const commentText = commentInput.value;
          const container = document.getElementById("comments-container");

          if (selectedRating === 0) { alert("يرجى اختيار تقييم بالنجوم أولاً!"); return; }
          if (commentText.trim() === "") { alert("يرجى كتابة تعليق!"); return; }

          if (container.querySelector(".text-muted")) { container.innerHTML = ""; }

          let starHtml = "";
          for (let i = 1; i <= 5; i++) {
            starHtml += `<i class="fa-solid fa-star ${i <= selectedRating ? "text-warning" : "text-secondary"}" style="font-size: 0.8rem;"></i>`;
          }

          const newComment = `
            <div class="comment-card shadow-sm mb-3 p-3 bg-white rounded-3 animate__animated animate__fadeIn">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="fw-bold mb-0">مستخدم جديد</h6>
                <div class="stars">${starHtml}</div>
              </div>
              <p class="text-muted mb-0 small">${commentText}</p>
            </div>`;

          container.insertAdjacentHTML("afterbegin", newComment);
          commentInput.value = "";
          selectedRating = 0;
          updateStarsDisplay(0);
        };
      });
    </script>
  </body>
</html>
