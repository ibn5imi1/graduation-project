<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="../src/assets/images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفاصيل البيتزا</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- start header -->
    <nav
      class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top"
    >
      <div class="container">
        <div class="d-flex align-items-center">
          <a class="navbar-brand" href="index.html">بيتزا دي روما</a>
          <div class="navbar-logo">
            <img src="../src/assets/images/logo.png" alt="Logo" />
          </div>
        </div>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 p-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >الرئيسية</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="order.html">طلبك</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">حول المطعم</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contactUs.html">اتصل بنا</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- end header -->

    <div class="container py-5">
      <div class="row g-5 align-items-center">
        <div class="col-md-6">
          <img
            id="display-img"
            src="../src/assets/images/logo.png"
            alt="Product"
            class="product-img w-100 shadow"
          />
        </div>
        <div class="col-md-6">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-dark">الرئيسية</a></li>
              <li class="breadcrumb-item active" id="breadcrumb-name">المنتج</li>
            </ol>
          </nav>
          <h1 id="display-name" class="display-4 fw-bold mb-3"></h1>
          <h2 id="display-price" class="text-danger fw-bold mb-4"></h2>
          <p class="lead text-muted mb-4">
            استمتع بمذاق البيتزا الإيطالية الأصلية، محضرة يدوياً بأجود المكونات
            الطازجة والتوابل السرية لتمنحك تجربة لا تُنسى.
          </p>
        </div>
      </div>

      <hr class="my-5" />

      <div class="row">
        

        <div class="col-lg-5">
          <div class="card border-0 shadow-sm p-4 rounded-4">
            <h4 class="fw-bold mb-3">أضف تقييمك</h4>
            <div class="mb-3">
              <label class="d-block mb-2 fw-medium">تقييمك بالنجوم:</label>
              <div class="star-rating" id="star-input">
                <i class="fa-solid fa-star" data-value="1"></i>
                <i class="fa-solid fa-star" data-value="2"></i>
                <i class="fa-solid fa-star" data-value="3"></i>
                <i class="fa-solid fa-star" data-value="4"></i>
                <i class="fa-solid fa-star" data-value="5"></i>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-medium">تعليقك:</label>
              <textarea id="user-comment" class="form-control" rows="4" placeholder="اكتب رأيك في هذا المنتج..."></textarea>
            </div>
            <button onclick="postComment()" class="btn btn-submit w-100 fw-bold">نشر التعليق</button>
          </div>
        </div>

        <div class="col-lg-7">
          <h3 class="mb-4 fw-bold text-dark">آراء العملاء</h3>
          <div id="comments-container">
            <div class="text-muted small">لا توجد تعليقات بعد، كن أول من يعلق!</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
